<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Patri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2c2420;
    --cream:#f6efe4;
    --cream-deep:#ece0cc;
    --night:#241d24;
    --plum:#6d3b4a;
    --gold:#b8863f;
    --line: rgba(44,36,32,0.18);
  }

  *{box-sizing:border-box;}

  html{
    margin:0;
    padding:0;
    height:100%;
    background:var(--night);
  }

  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    overflow-x:hidden;
    width:100%;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(255,255,255,0.04), transparent 45%),
      var(--night);
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  .card{
    position:relative;
    width:100%;
    max-width:460px;
    background:var(--cream);
    border-radius:6px;
    padding:clamp(28px, 8vw, 44px) clamp(20px, 6vw, 36px) clamp(26px, 7vw, 38px);
    box-shadow:0 30px 70px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.06);
    overflow:hidden;
    animation:riseIn 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px);}
    to{opacity:1; transform:translateY(0);}
  }

  .frame{
    position:absolute;
    inset:10px;
    border:1px solid var(--line);
    border-radius:3px;
    pointer-events:none;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--plum);
    text-align:center;
    margin:0 0 6px;
  }

  .to-name{
    text-align:center;
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:15px;
    color:var(--ink);
    opacity:0.75;
    margin:0 0 22px;
  }

  /* --- Bowl + steam --- */
  .bowl-wrap{
    position:relative;
    width:150px;
    height:150px;
    margin:0 auto 18px;
  }

  .steam{
    position:absolute;
    bottom:78px;
    width:6px;
    border-radius:6px;
    background:linear-gradient(to top, rgba(44,36,32,0), rgba(44,36,32,0.22) 35%, rgba(44,36,32,0));
    filter:blur(1.5px);
  }
  .steam1{ left:44px; height:46px; animation:steamRise 3.4s ease-in-out infinite; }
  .steam2{ left:70px; height:56px; animation:steamRise 3.8s ease-in-out infinite 0.6s; }
  .steam3{ left:96px; height:44px; animation:steamRise 3.2s ease-in-out infinite 1.2s; }

  @keyframes steamRise{
    0%{ transform:translateY(0) translateX(0) scaleY(0.9); opacity:0; }
    15%{ opacity:0.8; }
    50%{ transform:translateY(-22px) translateX(-4px) scaleY(1.05); opacity:0.6; }
    80%{ opacity:0.2; }
    100%{ transform:translateY(-46px) translateX(5px) scaleY(1.1); opacity:0; }
  }

  svg.bowl{ position:absolute; bottom:0; left:0; }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:6px 0 22px;
  }
  .divider .dot{ width:4px; height:4px; background:var(--gold); border-radius:50%; }
  .divider .rule{ flex:1; height:1px; background:var(--line); }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(24px, 7vw, 30px);
    line-height:1.3;
    text-align:center;
    margin:0 0 30px;
    color:var(--ink);
  }

  .message{
    font-size:clamp(14.5px, 4vw, 15.5px);
    line-height:1.75;
    text-align:center;
    color:var(--ink);
    opacity:0.88;
    margin:0 auto 30px;
    max-width:360px;
  }

  .ticket{
    position:relative;
    background:var(--cream-deep);
    border-radius:4px;
    padding:22px 20px;
    margin-bottom:8px;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    top:50%;
    width:20px;
    height:20px;
    background:var(--cream);
    border-radius:50%;
    transform:translateY(-50%);
  }
  .ticket::before{ left:-10px; }
  .ticket::after{ right:-10px; }

  .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    gap:14px;
  }
  .row:last-child{ border-bottom:none; }

  .row .label{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--plum);
    white-space:nowrap;
  }

  .row .value{
    font-size:14.5px;
    font-weight:500;
    text-align:right;
    color:var(--ink);
  }

  .row .value.place{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:16px;
  }

  .row .value a{
    color:var(--plum);
    text-decoration:none;
    border-bottom:1px solid rgba(109,59,74,0.35);
  }
  .row .value a:hover{ border-bottom-color:var(--plum); }

  .footer-note{
    text-align:center;
    margin-top:26px;
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
    opacity:0.65;
  }

  .ticket{ overflow-wrap:anywhere; }

  @media (max-width:360px){
    .row{
      flex-direction:column;
      align-items:flex-start;
      gap:2px;
      padding:10px 0;
    }
    .row .value{ text-align:left; }
    .bowl-wrap{ width:130px; height:130px; }
  }

  /* --- Pantalla inicial (Sí / No) --- */
  .gate{
    position:relative;
    width:100%;
    max-width:460px;
    background:var(--cream);
    border-radius:6px;
    padding:clamp(32px, 9vw, 52px) clamp(20px, 6vw, 36px) clamp(30px, 8vw, 44px);
    box-shadow:0 30px 70px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.06);
    text-align:center;
    animation:riseIn 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  .gate .question{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(22px, 6.5vw, 28px);
    line-height:1.35;
    margin:0 0 34px;
    color:var(--ink);
  }

  .game-box{
    position:relative;
    height:150px;
    width:100%;
  }

  .btn{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    border:none;
    border-radius:999px;
    padding:13px 30px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .btn-yes{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-120%, -50%);
    background:var(--plum);
    color:var(--cream);
    box-shadow:0 8px 18px rgba(109,59,74,0.35);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    z-index:2;
  }
  .btn-yes:hover{ transform:translate(-120%, -50%) scale(1.05); }
  .btn-yes:active{ transform:translate(-120%, -50%) scale(0.97); }

  .btn-no{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(20%, -50%);
    background:transparent;
    color:var(--ink);
    opacity:0.55;
    border:1px solid var(--line);
    transition:top 0.35s cubic-bezier(.22,1,.36,1), left 0.35s cubic-bezier(.22,1,.36,1);
  }

  .gate-hint{
    margin:20px 0 0;
    font-size:12.5px;
    color:var(--ink);
    opacity:0.5;
  }

  .hidden{ display:none !important; }
</style>

</head>
<body>

  <div class="gate" id="gate">
    <p class="eyebrow">Para Patri</p>
    <p class="question">¿Te vienes a<br>cenar ramen?</p>

    <div class="game-box" id="gameBox">
      <button class="btn btn-yes" id="btnYes">Sí</button>
      <button class="btn btn-no" id="btnNo">No</button>
    </div>
  </div>

  <div class="card hidden" id="invitation">
    <div class="frame"></div>

    <p class="eyebrow">Una mesa para dos</p>
    <p class="to-name">Para Patri</p>

    <div class="bowl-wrap">
      <div class="steam steam1"></div>
      <div class="steam steam2"></div>
      <div class="steam steam3"></div>
      <svg class="bowl" width="150" height="90" viewBox="0 0 150 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="75" cy="78" rx="58" ry="8" fill="#2c2420" opacity="0.08"/>
        <path d="M18 40 C18 40 22 82 75 82 C128 82 132 40 132 40 Z" fill="#6d3b4a"/>
        <path d="M18 40 C18 40 22 82 75 82 C128 82 132 40 132 40 Z" fill="url(#bowlShade)"/>
        <ellipse cx="75" cy="40" rx="57" ry="11" fill="#4d2933"/>
        <ellipse cx="75" cy="38" rx="50" ry="9" fill="#c99a4e"/>
        <ellipse cx="75" cy="38" rx="50" ry="9" fill="url(#brothShade)"/>
        <path d="M50 34 q6 -8 12 0 q6 8 12 0" stroke="#f6efe4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="M78 35 q5 -6 10 0" stroke="#f6efe4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
        <circle cx="95" cy="35" r="5.5" fill="#b8863f"/>
        <circle cx="95" cy="35" r="5.5" fill="url(#eggShade)"/>
        <ellipse cx="60" cy="40" rx="4.5" ry="3" fill="#4a6b4f"/>
        <ellipse cx="68" cy="43" rx="4.5" ry="3" fill="#4a6b4f"/>
        <defs>
          <linearGradient id="bowlShade" x1="18" y1="40" x2="132" y2="82" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ffffff" stop-opacity="0.08"/>
            <stop offset="1" stop-color="#000000" stop-opacity="0.12"/>
          </linearGradient>
          <radialGradient id="brothShade" cx="0.35" cy="0.3" r="0.9">
            <stop stop-color="#e0b465"/>
            <stop offset="1" stop-color="#c99a4e"/>
          </radialGradient>
          <radialGradient id="eggShade" cx="0.35" cy="0.3" r="0.8">
            <stop stop-color="#f0e6d2"/>
            <stop offset="0.55" stop-color="#e0b24a"/>
            <stop offset="1" stop-color="#6d3b4a"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <div class="divider"><span class="rule"></span><span class="dot"></span><span class="rule"></span></div>

    <h1>¿Te apetece<br>un ramen?</h1>

    <div class="ticket">
      <div class="row">
        <span class="label">Restaurante</span>
        <span class="value place">Umaimon Ramen</span>
      </div>
      <div class="row">
        <span class="label">Dirección</span>
        <span class="value"><a href="https://www.takumiramennoodles.com/es/barcelona-catalanes/" target="_blank" rel="noopener">Barcelona · Gran Vía</a></span>
      </div>
      <div class="row">
        <span class="label">Fecha</span>
        <span class="value">Sábado 11 de julio</span>
      </div>
      <div class="row">
        <span class="label">Cena</span>
        <span class="value">20:45 h</span>
      </div>
      <div class="row">
        <span class="label">Paso a buscarte</span>
        <span class="value">19:00 h · en tu casa</span>
      </div>
    </div>

  </div>

  <script>
    const gameBox = document.getElementById('gameBox');
    const btnNo = document.getElementById('btnNo');
    const btnYes = document.getElementById('btnYes');
    const gate = document.getElementById('gate');
    const invitation = document.getElementById('invitation');

    function dodge(){
      const boxRect = gameBox.getBoundingClientRect();
      const btnRect = btnNo.getBoundingClientRect();
      const padding = 6;
      const maxX = Math.max(boxRect.width - btnRect.width - padding, padding);
      const maxY = Math.max(boxRect.height - btnRect.height - padding, padding);
      const x = padding + Math.random() * (maxX - padding);
      const y = padding + Math.random() * (maxY - padding);
      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
      btnNo.style.transform = 'translate(0, 0)';
    }

    btnNo.addEventListener('pointerenter', dodge);
    btnNo.addEventListener('pointerdown', function(e){ e.preventDefault(); dodge(); });
    btnNo.addEventListener('touchstart', function(e){ e.preventDefault(); dodge(); }, {passive:false});
    btnNo.addEventListener('click', function(e){ e.preventDefault(); dodge(); });
    btnNo.addEventListener('focus', dodge);

    btnYes.addEventListener('click', function(){
      gate.classList.add('hidden');
      invitation.classList.remove('hidden');
    });

    window.addEventListener('resize', function(){
      if(btnNo.style.left) dodge();
    });
  </script>

</body>
</html>
